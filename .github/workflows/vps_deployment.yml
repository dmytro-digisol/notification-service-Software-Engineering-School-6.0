name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Lint with Biome on every push and PR ──────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  # ── Run tests on every push and PR ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # ── Build image, push to GHCR, deploy to DigitalOcean VPS ─────────────────
  # Runs only on push to main after lint and tests pass.
  #
  # Required GitHub Secrets:
  #   DO_SSH_HOST  — VPS IP address or hostname
  #   DO_SSH_USER  — SSH user on the VPS (e.g. root)
  #   DO_SSH_KEY   — private SSH key (the public key must be in ~/.ssh/authorized_keys on the VPS)
  #
  # On the VPS you need:
  #   • Docker + Docker Compose plugin installed
  #   • /var/www/notification-service-Software-Engineering-School-6.0/.env file with app secrets (see backend/.env.example)
  deploy:
    name: Build & Deploy
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # GHCR image names must be lowercase
      - name: Compute image name
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy production compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: docker-compose.yml
          target: /var/www/notification-service-Software-Engineering-School-6.0

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          APP_IMAGE: ${{ steps.image.outputs.name }}:latest
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: APP_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /var/www/notification-service-Software-Engineering-School-6.0
            APP_IMAGE="$APP_IMAGE" docker compose -f docker-compose.prod.yml pull
            APP_IMAGE="$APP_IMAGE" docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
