name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Lint with Biome on every push and PR ──────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  # ── Run tests on every push and PR ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # ── Deploy to VPS ──────────────────────────────────────────────────────────
  # Runs only on push to main after lint and tests pass.
  #
  # Required GitHub Secrets:
  #   DO_SSH_HOST  — VPS IP address or hostname
  #   DO_SSH_USER  — SSH user on the VPS (e.g. root)
  #   DO_SSH_KEY   — private SSH key (public key must be in ~/.ssh/authorized_keys on the VPS)
  #
  # On the VPS you need:
  #   • Docker + Docker Compose plugin installed
  #   • Repo already cloned at /var/www/notification-service-Software-Engineering-School-6.0
  #   • .env file filled in at /var/www/notification-service-Software-Engineering-School-6.0/backend/.env
  deploy:
    name: Deploy
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /var/www/notification-service-Software-Engineering-School-6.0
            git pull origin main
            docker compose up --build -d --remove-orphans
            docker image prune -f
